<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Survivor 50 — Draft Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --fire:#FF6B1A;--fire-light:#FF9950;--gold:#FFD700;--gold-dim:#B8860B;
  --bg:#0E0A07;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.08);
  --border:rgba(255,107,26,.18);--border-hi:rgba(255,107,26,.45);
  --text:#F0E6D3;--text-dim:rgba(240,230,211,.5);--text-muted:rgba(240,230,211,.28);
  --green:#4ADE80;--blue:#60A5FA;--red:#F87171;--silver:#C0C0C0;--bronze:#CD7F32;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 100%,rgba(139,37,0,.22) 0%,transparent 70%),radial-gradient(ellipse 40% 28% at 8% 65%,rgba(255,107,26,.07) 0%,transparent 60%),radial-gradient(ellipse 40% 28% at 92% 35%,rgba(255,107,26,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 14px 90px}

/* HEADER */
header{text-align:center;padding:32px 0 20px}
.torch{font-size:2.2rem;display:inline-block;animation:flicker 2.5s ease-in-out infinite alternate}
@keyframes flicker{0%{filter:drop-shadow(0 0 6px #FF6B1A);transform:scale(1) rotate(0deg)}40%{filter:drop-shadow(0 0 18px #FFD700);transform:scale(1.07) rotate(-1.5deg)}100%{filter:drop-shadow(0 0 10px #FF9950);transform:scale(.97) rotate(1deg)}}
h1{font-family:'Cinzel',serif;font-size:clamp(1.7rem,6vw,3.1rem);font-weight:900;color:var(--gold);text-shadow:0 0 40px rgba(255,107,26,.7),0 2px 4px rgba(0,0,0,.9);letter-spacing:.04em;line-height:1.1;margin-top:5px}
.subtitle{font-size:.75rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--fire-light);margin-top:5px;opacity:.8}
.ep-pill{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(139,37,0,.7),rgba(255,107,26,.35));border:1px solid var(--border-hi);color:var(--text);font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-top:11px}
.ep-dot{width:6px;height:6px;background:var(--fire);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

/* MERGE BANNER */
.merge-banner{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,107,26,.07));border:1px solid rgba(255,215,0,.3);border-radius:var(--r);padding:11px 18px;margin:14px 0 22px;text-align:center;font-size:.8rem;font-weight:600;color:var(--gold);letter-spacing:.05em}
.merge-banner span{opacity:.65;font-size:.73rem;font-weight:400;display:block;margin-top:3px;color:var(--text-dim)}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:22px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:68px;background:transparent;border:none;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:9px 8px;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab-btn .ti{font-size:.95rem}
.tab-btn:hover{color:var(--text);background:var(--surface2)}
.tab-btn.active{background:linear-gradient(135deg,rgba(139,37,0,.85),rgba(255,107,26,.55));color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* SEC LABEL */
.sec-label{font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--fire-light);margin-bottom:13px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(255,107,26,.3),transparent)}

/* LEADERBOARD */
.leader-list{display:flex;flex-direction:column;gap:9px}
.leader-card{display:grid;grid-template-columns:46px 1fr auto;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;transition:all .2s;position:relative;overflow:hidden}
.leader-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fire);opacity:0;transition:.2s}
.leader-card:hover::before{opacity:1}
.leader-card.r1{border-color:rgba(255,215,0,.35);background:rgba(255,215,0,.05)}
.leader-card.r2{border-color:rgba(192,192,192,.22)}
.leader-card.r3{border-color:rgba(205,127,50,.22)}
.rank-num{font-family:'Cinzel',serif;font-size:1.45rem;font-weight:900;text-align:center}
.r1 .rank-num{color:var(--gold);text-shadow:0 0 12px rgba(255,215,0,.5)}
.r2 .rank-num{color:var(--silver)}
.r3 .rank-num{color:var(--bronze)}
.rank-num.lo{color:var(--text-muted);font-size:.95rem}
.leader-info{overflow:hidden}
.leader-name{font-weight:700;font-size:.98rem;color:var(--text)}
.picks-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.p-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:3px 9px 3px 4px;font-size:.7rem;font-weight:500;color:var(--text-dim)}
.p-chip.gone{opacity:.4;text-decoration:line-through;text-decoration-color:var(--fire)}
.p-chip img{width:22px;height:22px;border-radius:50%;object-fit:cover;object-position:top;flex-shrink:0;background:rgba(255,107,26,.15)}
.av-sm{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:var(--fire);background:rgba(255,107,26,.15);border:1px solid rgba(255,107,26,.2);flex-shrink:0}
.score-col{text-align:right}
.score-num{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:900;color:var(--fire-light);line-height:1}
.score-lbl{font-size:.6rem;font-weight:600;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase}

/* SCORECARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:13px}
.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.sc-head{background:rgba(255,107,26,.1);border-bottom:1px solid var(--border);padding:11px 15px;display:flex;justify-content:space-between;align-items:center}
.sc-name{font-family:'Cinzel',serif;font-size:.98rem;font-weight:700;color:var(--gold)}
.sc-total{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:900;color:var(--fire-light)}
.sc-picks{padding:9px 8px;display:flex;flex-direction:column;gap:5px}
.sc-row{display:grid;grid-template-columns:42px 1fr auto auto;align-items:center;gap:9px;padding:7px 8px;background:rgba(255,255,255,.03);border-radius:8px}
.sc-row.gone{opacity:.48}
.sc-row img,.av-sq{width:38px;height:38px;border-radius:8px;object-fit:cover;object-position:top;background:rgba(255,107,26,.1);border:1px solid rgba(255,107,26,.15);flex-shrink:0}
.av-sq{display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:var(--fire)}
.sc-pname{font-weight:600;font-size:.88rem;color:var(--text)}
.sc-pname.struck{text-decoration:line-through;text-decoration-color:var(--fire);color:var(--text-dim)}
.badge{font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:4px;white-space:nowrap}
.b-active{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.22)}
.b-eliminated{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.b-medevac{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.b-jury{background:rgba(255,107,26,.1);color:var(--fire-light);border:1px solid rgba(255,107,26,.22)}
.b-winner{background:rgba(255,215,0,.13);color:var(--gold);border:1px solid rgba(255,215,0,.35)}
.sc-pts{font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;color:var(--fire-light);white-space:nowrap}

/* CAST */
.cast-section{margin-bottom:28px}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:9px}
@media(max-width:380px){.cast-grid{grid-template-columns:repeat(3,1fr)}}
.cast-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .2s}
.cast-card:hover{border-color:var(--border-hi);transform:translateY(-2px)}
.cast-card.gone{opacity:.33;filter:grayscale(.7)}
.cast-card.gone:hover{transform:none}
.c-img-wrap{position:relative;aspect-ratio:3/4;background:rgba(255,107,26,.07);overflow:hidden}
.c-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform .3s}
.cast-card:not(.gone):hover .c-img-wrap img{transform:scale(1.05)}
.c-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:linear-gradient(160deg,rgba(255,107,26,.06),rgba(0,0,0,.2))}
.c-placeholder .big-init{font-family:'Cinzel',serif;font-size:2.2rem;font-weight:700;color:var(--fire);opacity:.55}
.gone-banner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25)}
.snuffed{background:rgba(139,37,0,.9);color:#FF9980;font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:5px;border:1px solid rgba(255,107,26,.5)}
.tribe-dot{position:absolute;top:6px;left:6px;width:9px;height:9px;border-radius:50%;border:2px solid rgba(0,0,0,.6);box-shadow:0 0 4px rgba(0,0,0,.5)}
.t-cila{background:#FF6B1A}.t-kalo{background:#3B82F6}.t-vatu{background:#22C55E}
.c-info{padding:8px 8px 10px}
.c-name{font-weight:700;font-size:.76rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-drafter{font-size:.65rem;color:var(--fire-light);font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-pts{font-family:'Cinzel',serif;font-size:.77rem;font-weight:700;color:var(--gold-dim);margin-top:2px}
.c-ep{font-size:.62rem;color:#555;margin-top:2px}

/* EPISODE LOG */
.ep-list{display:flex;flex-direction:column;gap:11px}
.ep-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ep-card.latest{border-color:rgba(255,215,0,.3);box-shadow:0 0 20px rgba(255,107,26,.1)}
.ep-head{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid rgba(255,107,26,.1);background:rgba(255,107,26,.06);flex-wrap:wrap}
.ep-badge{background:linear-gradient(135deg,#8B2500,var(--fire));color:#fff;font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.08em;white-space:nowrap}
.ep-badge.new{background:linear-gradient(135deg,#5B4000,#c8960d)}
.ep-ttl{font-weight:700;font-size:.92rem;flex:1}
.ep-dt{font-size:.7rem;color:var(--text-muted);white-space:nowrap}
.ep-evts{padding:11px 13px;display:flex;flex-wrap:wrap;gap:6px}
.ev{font-size:.7rem;font-weight:600;letter-spacing:.05em;padding:5px 10px;border-radius:6px;text-transform:uppercase}
.ev-boot{background:rgba(139,37,0,.22);color:#FF9980;border:1px solid rgba(139,37,0,.45)}
.ev-medevac{background:rgba(96,165,250,.12);color:#93C5FD;border:1px solid rgba(96,165,250,.3)}
.ev-idol{background:rgba(255,215,0,.1);color:#FFE05C;border:1px solid rgba(255,215,0,.28)}
.ev-swap{background:rgba(74,222,128,.08);color:#86EFAC;border:1px solid rgba(74,222,128,.22)}
.ev-immunity{background:rgba(167,139,250,.1);color:#C4B5FD;border:1px solid rgba(167,139,250,.27)}
.ev-note{background:rgba(255,255,255,.04);color:var(--text-dim);border:1px solid rgba(255,255,255,.09)}

/* SCORING KEY */
.key-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;max-width:600px;margin:0 auto}
.key-box h3{font-family:'Cinzel',serif;color:var(--gold);font-size:.95rem;text-align:center;margin-bottom:16px;letter-spacing:.1em}
.key-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:380px){.key-grid{grid-template-columns:1fr}}
.key-row{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:8px 11px;background:rgba(255,255,255,.03);border-radius:7px;border-left:3px solid rgba(255,107,26,.38)}
.key-row span:first-child{font-size:.82rem}
.kpts{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:var(--gold);white-space:nowrap}
.key-note{text-align:center;font-size:.75rem;color:var(--text-muted);margin-top:13px;font-style:italic}
.divider{border:none;border-top:1px solid rgba(255,107,26,.11);margin:22px 0}

/* LOADING SHIMMER */
.shimmer{background:linear-gradient(110deg,rgba(255,107,26,.04) 30%,rgba(255,107,26,.1) 50%,rgba(255,107,26,.04) 70%);background-size:200% 100%;animation:sh 1.4s linear infinite}
@keyframes sh{to{background-position:-200% 0}}
</style>
</head>

const imgCache = {};   // id -> url string | null

async function tryWikiTitle(title) {
  const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&format=json&pithumbsize=400&origin=*`;
  try {
    const r = await fetch(url, {signal: AbortSignal.timeout(5000)});
    const d = await r.json();
    const page = Object.values(d?.query?.pages || {})[0];
    return page?.thumbnail?.source || null;
  } catch(e) { return null; }
}

async function resolveImg(id) {
  if (imgCache[id] !== undefined) return imgCache[id];
  imgCache[id] = null;
  const titles = WIKI_TITLES[id] || [];
  for (const t of titles) {
    const src = await tryWikiTitle(t);
    if (src) { imgCache[id] = src; return src; }
  }
  return null;
}

async function preloadAll() {
  // Fire all requests concurrently, batching to avoid rate limits
  const ids = CAST.map(c => c.id);
  await Promise.allSettled(ids.map(id => resolveImg(id)));
}

// ── HELPERS ───────────────────────────────────────────────────
function pts(c){return c.eps*SC.perEp+c.bonuses.reduce((s,b)=>s+(BM[b]||0),0)}

function drafterPts(d){
  let tot=0;
  const rows=d.picks.map(n=>{
    const m=CAST.find(c=>c.name.toLowerCase()===n.toLowerCase());
    const p=m?pts(m):0; tot+=p;
    return{name:n,pts:p,status:m?.status||'unknown',elim:m?.elimType||null,id:m?.id||null};
  });
  return{tot,rows};
}

function ini(name){return name.split(/[\s']+/).map(w=>w[0]).join('').toUpperCase().slice(0,2)}

function photoImg(id, name, cls, style='') {
  const src = imgCache[id];
  if (src) {
    return `<img src="${src}" alt="${name}" class="${cls}" style="${style}" loading="lazy" onerror="this.replaceWith(makeAv('${ini(name)}','${cls}','${style}'))">`;
  }
  return `<div class="${cls}" style="display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--fire);background:rgba(255,107,26,.1);${style}">${ini(name)}</div>`;
}

function makeAv(txt, cls, style) {
  const d = document.createElement('div');
  d.className = cls;
  d.style.cssText = `display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--fire);background:rgba(255,107,26,.1);${style}`;
  d.textContent = txt;
  return d;
}
window.makeAv = makeAv;

// ── LEADERBOARD ───────────────────────────────────────────────
function renderLB(){
  const sorted=DRAFTERS.map(d=>{const s=drafterPts(d);return{...d,tot:s.tot,rows:s.rows}}).sort((a,b)=>b.tot-a.tot);
  let h='<div class="leader-list">';
  sorted.forEach((s,i)=>{
    const r=i+1,rc=r<=3?`r${r}`:'',rn=r===1?'🥇':r===2?'🥈':r===3?'🥉':r,lo=r>3?' lo':'';
    const chips=s.rows.map(p=>{
      const gone=['eliminated','medevac'].includes(p.status);
      const src=p.id?imgCache[p.id]:null;
      const ph=src
        ?`<img src="${src}" loading="lazy" onerror="this.outerHTML='<div class=av-sm>${ini(p.name)}</div>'" style="width:22px;height:22px;border-radius:50%;object-fit:cover;object-position:top;border:1px solid rgba(255,107,26,.2);flex-shrink:0">`
        :`<div class="av-sm">${ini(p.name)}</div>`;
      return`<div class="p-chip${gone?' gone':''}">${ph}<span>${p.name}</span></div>`;
    }).join('');
    h+=`<div class="leader-card ${rc}">
      <div class="rank-num${lo}">${rn}</div>
      <div class="leader-info"><div class="leader-name">${s.name}</div><div class="picks-row">${chips}</div></div>
      <div class="score-col"><div class="score-num">${s.tot}</div><div class="score-lbl">pts</div></div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('pane-lb').innerHTML=h;
}

// ── SCORECARDS ────────────────────────────────────────────────
function renderSC(){
  let h='<div class="cards-grid">';
  DRAFTERS.forEach(d=>{
    const s=drafterPts(d);
    const rows=s.rows.map(p=>{
      const gone=['eliminated','medevac'].includes(p.status);
      const bc={active:'b-active',eliminated:'b-eliminated',medevac:'b-medevac',jury:'b-jury',winner:'b-winner'}[p.status]||'b-active';
      const bl={active:'Active',eliminated:'Out',medevac:'Medevac',jury:'Jury',winner:'Winner!'}[p.status]||p.status;
      const src=p.id?imgCache[p.id]:null;
      const ph=src
        ?`<img src="${src}" loading="lazy" onerror="this.outerHTML='<div class=av-sq>${ini(p.name)}</div>'" style="width:38px;height:38px;border-radius:8px;object-fit:cover;object-position:top;background:rgba(255,107,26,.1);border:1px solid rgba(255,107,26,.15);flex-shrink:0">`
        :`<div class="av-sq">${ini(p.name)}</div>`;
      return`<div class="sc-row${gone?' gone':''}">
        ${ph}
        <div class="sc-pname${gone?' struck':''}">${p.name}</div>
        <div class="badge ${bc}">${bl}</div>
        <div class="sc-pts">${p.pts}pt</div>
      </div>`;
    }).join('');
    h+=`<div class="sc-card"><div class="sc-head"><span class="sc-name">${d.name}</span><span class="sc-total">${s.tot}pt</span></div><div class="sc-picks">${rows}</div></div>`;
  });
  h+='</div>';
  document.getElementById('pane-sc').innerHTML=h;
}

// ── CAST ──────────────────────────────────────────────────────
function renderCast(){
  const dl={};DRAFTERS.forEach(d=>d.picks.forEach(p=>dl[p.toLowerCase()]=d.name));
  const card=c=>{
    const gone=['eliminated','medevac'].includes(c.status);
    const p=pts(c),drafter=dl[c.name.toLowerCase()]||null;
    const src=imgCache[c.id];
    const imgInner=src
      ?`<img src="${src}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+
       `<div class="c-placeholder" style="display:none"><div class="big-init">${ini(c.name)}</div></div>`
      :`<div class="c-placeholder"><div class="big-init">${ini(c.name)}</div></div>`;
    const banner=gone
      ?`<div class="gone-banner"><span class="snuffed">${c.elimType==='medevac'?'🏥 Medevac':'🗳️ Voted Out'}</span></div>`
      :'';
    return`<div class="cast-card${gone?' gone':''}">
      <div class="c-img-wrap">${imgInner}<div class="tribe-dot t-${c.tribe}"></div>${banner}</div>
      <div class="c-info">
        <div class="c-name">${c.name}</div>
        ${drafter?`<div class="c-drafter">📌 ${drafter}</div>`:`<div class="c-drafter" style="color:#3a3a3a">Undrafted</div>`}
        ${gone
          ?`<div class="c-ep">Ep${c.epOut} · ${c.elimType==='medevac'?'Medevac':'Out'}</div>`
          :`<div class="c-pts">${p}pts</div>`}
      </div>
    </div>`;
  };
  const active=CAST.filter(c=>!['eliminated','medevac'].includes(c.status));
  const elim=CAST.filter(c=>['eliminated','medevac'].includes(c.status));
  document.getElementById('pane-cast').innerHTML=`
    <div class="cast-section">
      <div class="sec-label">Still In The Game (${active.length})</div>
      <div class="cast-grid">${active.map(card).join('')}</div>
    </div>
    <div class="divider"></div>
    <div class="cast-section">
      <div class="sec-label">Snuffed Torches (${elim.length})</div>
      <div class="cast-grid">${elim.map(card).join('')}</div>
    </div>`;
}

function tab(name,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  btn.classList.add('active');
}
